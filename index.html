<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>קבוצות נאמני עצים מקומיות</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom Colors - fixed for Tailwind usage */
    .bg-primary { background-color: #4D8607 !important; }
    .bg-accent { background-color: #D98E04 !important; }
    .bg-secondary { background-color: #B0BF3B !important; }

    .text-primary { color: #4D8607 !important; }
    .text-accent { color: #D98E04 !important; }
    .text-secondary { color: #B0BF3B !important; }

    /* Optional: hover/focus states for buttons and cards */
    .hover\:bg-secondary:hover { background-color: #D98E04 !important; }
    .focus\:ring-accent:focus { outline: none; box-shadow: 0 0 0 4px #D98E04; }
  </style>
</head>
<body class="bg-white text-gray-800 font-sans">

  <!-- Header -->
  <header class="flex flex-col items-center py-6 border-b border-gray-200">
  <!-- Logo -->
  <img src="https://static.wixstatic.com/media/6bd4ba_796793d06ff64aa58b9d236b217a90c0~mv2.png/v1/crop/x_131,y_0,w_3110,h_2982/fill/w_280,h_268,fp_0.50_0.50,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/%C3%A6%C3%BC%C3%BC%203-02.png" 
       alt="לוגו" 
       class="w-29 h-29 object-cover rounded-md mb-0">
       
  <h1 class="text-2xl font-bold text-primary">קבוצות נאמני עצים מקומיות</h1>
  <h1 class="text-2xl font-normal text-accent">תצוגה מקדימה של האתר</h1>
  <h1 class="text-2xl font-normal text-black">לחץ על האיזור המבוקש</h1>
  </header>

  <!-- Region Filters -->
  <section class="flex justify-center gap-4 my-6 px-4">
    <button class="region-btn px-8 py-3 rounded-lg font-semibold text-black bg-secondary hover:bg-secondary transition" data-region="צפון">צפון</button>
    <button class="region-btn px-8 py-3 rounded-lg font-semibold text-black bg-secondary hover:bg-secondary transition" data-region="מרכז">מרכז</button>
    <button class="region-btn px-8 py-3 rounded-lg font-semibold text-black bg-secondary hover:bg-secondary transition" data-region="דרום">דרום</button>
  </section>

  <!-- City Cards Grid -->
  <section class="px-4 pb-8">
    <div id="cityGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
  </section>

  <!-- JavaScript -->
  <script>

    // -----------------------------
    const cities = [
      // צפון (9)
      { name: "צפון עיר 1", region: "צפון", link: "https://chat.whatsapp.com/PLACEHOLDER1" },
      { name: "צפון עיר 2", region: "צפון", link: "https://chat.whatsapp.com/PLACEHOLDER2" },
      { name: "צפון עיר 3", region: "צפון", link: "https://chat.whatsapp.com/PLACEHOLDER3" },

      { name: "צפון עיר 6", region: "צפון", link: "https://chat.whatsapp.com/PLACEHOLDER6" },
      { name: "צפון עיר 7", region: "צפון", link: "https://chat.whatsapp.com/PLACEHOLDER7" },
      { name: "צפון עיר 8", region: "צפון", link: "https://chat.whatsapp.com/PLACEHOLDER8" },
      { name: "צפון עיר 9", region: "צפון", link: "https://chat.whatsapp.com/PLACEHOLDER9" },

      // מרכז (17)
      { name: "מרכז עיר 1", region: "מרכז", link: "https://chat.whatsapp.com/PLACEHOLDER10" },
      { name: "מרכז עיר 2", region: "מרכז", link: "https://chat.whatsapp.com/PLACEHOLDER11" },
      { name: "מרכז עיר 3", region: "מרכז", link: "https://chat.whatsapp.com/PLACEHOLDER12" },
      { name: "מרכז עיר 4", region: "מרכז", link: "https://chat.whatsapp.com/PLACEHOLDER13" },
      { name: "מרכז עיר 5", region: "מרכז", link: "https://chat.whatsapp.com/PLACEHOLDER14" },
      { name: "מרכז עיר 6", region: "מרכז", link: "https://chat.whatsapp.com/PLACEHOLDER15" },
      { name: "מרכז עיר 7", region: "מרכז", link: "https://chat.whatsapp.com/PLACEHOLDER16" },

      { name: "מרכז עיר 17", region: "מרכז", link: "https://chat.whatsapp.com/PLACEHOLDER26" },

      // דרום (4)
      { name: "אילת", region: "דרום", link: "https://chat.whatsapp.com/PLACEHOLDER27" },
      { name: "באר שבע", region: "דרום", link: "https://chat.whatsapp.com/PLACEHOLDER28" },
      { name: "ירוחם", region: "דרום", link: "https://chat.whatsapp.com/PLACEHOLDER29" },
      { name: "שדרות", region: "דרום", link: "https://chat.whatsapp.com/PLACEHOLDER30" },
    ];

    const cityGrid = document.getElementById('cityGrid');

    // -----------------------------
    // FUNCTION TO RENDER CARDS
    // -----------------------------
    function renderCities(filter = null) {
      cityGrid.innerHTML = '';
      const filtered = filter ? cities.filter(city => city.region === filter) : cities;

      filtered.forEach(city => {
        const card = document.createElement('a');
        card.href = city.link;
        card.target = "_blank";
        card.rel = "noopener";
        card.className = `
          block p-5 rounded-3xl shadow-lg text-white font-semibold
          bg-primary hover:bg-secondary transition
          focus:outline-none focus:ring-4 focus:ring-accent
          text-center text-2xl
        `;
        card.textContent = city.name;
        cityGrid.appendChild(card);
      });
    }

    // -----------------------------
    // INITIAL RENDER
    // -----------------------------
    // renderCities(); // Show all by default

    // -----------------------------
    // FILTER BUTTONS
    // -----------------------------
    document.querySelectorAll('.region-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const region = btn.getAttribute('data-region');
        renderCities(region);
      });
    });
  </script>
</body>
</html>
